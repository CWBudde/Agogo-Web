name: build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/engine-wasm/go.mod
          cache-dependency-path: packages/engine-wasm/go.sum

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Wasm engine
        run: just wasm-build

      - name: Build frontend
        run: bun run build
        working-directory: apps/editor-web
