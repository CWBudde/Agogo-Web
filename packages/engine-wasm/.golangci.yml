version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

    - revive
  settings:
    revive:
      rules:
        - name: file-length-limit
          arguments:
            - max: 1500
              skip-comments: false
              skip-blank-lines: false
formatters:
  enable:
    - gofumpt
    - gci

issues:
  exclusions:
    rules:
      # Functions registered via js.FuncOf are called from JS, not Go — suppress false "unused" warnings.
      - path: cmd/engine/main\.go
        linters: [unused]
